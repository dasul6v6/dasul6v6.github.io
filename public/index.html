<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NS 타자 땅따먹기 대결</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main id="game-layout" class="home-mode" aria-label="NS 타자 땅따먹기 대결">
      <section class="team-panel team-shuri" aria-label="슈리 팀">
        <img src="shuri.png" alt="슈리 캐릭터" class="team-character" />
        <div class="team-name">슈리</div>
        <div id="shuri-score" class="team-score">0</div>
      </section>

      <section id="game-container">
        <h1>NS 타자 땅따먹기 대결</h1>
        <div class="battle-badge">슈리 VS 챌리</div>

        <div id="role-display">방을 만들거나 입장해주세요.</div>

        <div id="home-vs-hero" class="home-vs-hero">
          <div class="home-team home-shuri">슈리</div>
          <div class="home-vs">VS</div>
          <div class="home-team home-challi">챌리</div>
        </div>

        <!-- 처음 화면: 방 만들기 / 방 입장 / 방 리스트 -->
        <div id="room-start-panel" class="room-panel">
          <button id="create-room-btn" type="button">방 만들기</button>

          <div class="join-room-box">
            <input
              type="text"
              id="room-id-input"
              placeholder="방 코드 입력"
              autocomplete="off"
            />
            <button id="join-room-btn" type="button">방 입장</button>
          </div>

          <div class="room-list-wrap">
            <div class="room-list-title">현재 생성된 방</div>

            <div id="room-list" class="room-list">
              <div class="empty-room-message">새로운 방을 만들어주세요!</div>
            </div>
          </div>
        </div>

        <!-- 방 생성/입장 후 화면: 방 코드 / Ready -->
        <div id="room-ready-panel" class="room-panel hidden">
          <div class="room-code-box">
            <span class="room-code-label">방 코드</span>
            <strong id="room-code-display">------</strong>
            <button id="copy-room-btn" type="button">복사</button>
          </div>

          <div id="room-info">상대 플레이어를 기다리는 중입니다.</div>

          <button id="ready-btn" type="button" disabled>Ready</button>
        </div>

        <div id="timer-display">남은 시간: 01:30</div>
        <div id="score-display">SHURI 0 VS 0 CHALLI</div>

        <div id="board" aria-label="단어 보드"></div>

        <div id="input-container">
          <input
            type="text"
            id="word-input"
            placeholder="방을 만들거나 입장해주세요."
            autocomplete="off"
            disabled
          />
          <button id="restart-btn" type="button">홈으로 가기</button>
        </div>

        <!-- 대기 오버레이 -->
        <div id="waiting-overlay" class="waiting-overlay hidden">
          <div class="waiting-card">
            <div class="waiting-character-wrap">
              <img
                id="waiting-character"
                src="shuri.png"
                alt="내 캐릭터"
                class="waiting-character"
              />
            </div>

            <div id="waiting-role" class="waiting-role">대기 중</div>
            <div id="waiting-title" class="waiting-title">
              방을 만들거나 입장해주세요
            </div>

            <!-- 대기 팝업 안 방 코드 표시 -->
            <div
              id="waiting-room-code-box"
              class="waiting-room-code-box hidden"
            >
              <span class="waiting-room-code-label">방 코드</span>
              <strong id="waiting-room-code">------</strong>
              <button id="waiting-copy-room-btn" type="button">복사</button>
            </div>

            <!-- 대기 팝업 안 Ready 버튼 -->
            <button
              id="waiting-ready-btn"
              class="waiting-ready-btn hidden"
              type="button"
            >
              Ready
            </button>

            <div class="waiting-desc">
              방을 만든 뒤 상대에게 방 코드를 공유해주세요. 두 플레이어가 모두
              Ready를 누르면 5초 뒤 게임이 시작됩니다.
            </div>

            <div class="loading-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </section>

      <section class="team-panel team-challi" aria-label="챌리 팀">
        <img src="challi.png" alt="챌리 캐릭터" class="team-character" />
        <div class="team-name">챌리</div>
        <div id="challi-score" class="team-score">0</div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
