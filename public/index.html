<body>
    <div id="game-layout">
        <!-- 왼쪽 캐릭터 -->
        <div class="team-panel team-shuri">
            <img src="shuri.png" alt="슈리팀 캐릭터" class="team-character">
            <div class="team-name">슈리팀</div>
            <div id="shuri-score" class="team-score">0</div>
        </div>

        <!-- 게임 영역 -->
        <div id="game-container">
            <h1>NS 타자 판뒤집기 대결</h1>
            <div id="role-display">접속 중...</div>
            
            <div id="timer-display">남은 시간: 01:30</div>
            <div id="score-display">슈리팀: 0 | 챌리팀: 0</div>
            
            <div id="board"></div>

            <div id="input-container">
                <input type="text" id="word-input" placeholder="다른 플레이어를 기다리는 중입니다..." autocomplete="off" disabled>
                <button id="restart-btn">게임 다시 시작</button>
            </div>
        </div>

        <!-- 오른쪽 캐릭터 -->
        <div class="team-panel team-challi">
            <img src="challi.png" alt="챌리팀 캐릭터" class="team-character">
            <div class="team-name">챌리팀</div>
            <div id="challi-score" class="team-score">0</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
